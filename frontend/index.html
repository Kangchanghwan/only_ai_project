      <!-- Critical CSS for LCP optimization -->
    <style>
      /* 기본 다크 테마 색상 (초기 로딩용) */
      :root {
        --color-background: #1C1917;
        --color-surface: #262220;
        --color-text-primary: #F2EDE7;
        --color-text-secondary: #A69A8D;
        --color-border: #3A3430;
      }

      body {
        /* 폰 프레임 바깥 레터박스는 테마와 무관하게 고정된 중립 배경을 사용한다 (frontend/src/style.css와 동일) */
        background-color: #F7F7F7;
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Skeleton loader - exact layout match with RoomScreen */
      .app-skeleton {
        max-width: 1600px;
        margin: 0 auto;
        padding: 1.5rem; /* p-6 */
      }

      .app-skeleton__main {
        background-color: var(--color-surface);
        border-radius: 0.75rem; /* rounded-xl */
        padding: 2rem; /* p-8 */
        border: 1px solid var(--color-border);
        transition: background-color 0.3s ease, border-color 0.3s ease;
      }

      .app-skeleton__grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.5rem; /* gap-6 */
        margin-top: 2rem;
      }

      .app-skeleton__card {
        position: relative;
        border-radius: 0.5rem; /* rounded-lg */
        overflow: hidden;
        border: 2px dashed var(--color-border);
        background-color: var(--color-background);
        transition: all 0.3s ease;
      }

      .app-skeleton__card-content {
        width: 100%;
        height: 200px; /* h-[200px] */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem; /* gap-3 */
        background-color: var(--color-surface);
        opacity: 0.5;
      }

      .app-skeleton__icon {
        font-size: 80px; /* text-[80px] - CRITICAL FOR LCP */
        line-height: 1;
      }

      .app-skeleton__title {
        font-size: 0.875rem; /* text-sm */
        font-weight: 600; /* font-semibold */
        color: var(--color-text-primary);
      }

      .app-skeleton__subtitle {
        font-size: 0.75rem; /* text-xs */
        color: var(--color-text-secondary);
        padding: 0 1rem; /* px-4 */
        text-align: center;
      }

      /* Hide skeleton when Vue app mounts */
      #app:not(:empty) > .app-skeleton {
        display: none;
      }
    </style>
